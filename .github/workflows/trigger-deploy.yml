name: Trigger Testing Frontend Vendor Deployment


on:
  push:
    branches:
      - main

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger DevOps Deployment
        run: |
          echo "🚀 Triggering Vendor Deployment..."

          curl -i \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DEVOPS_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Ierada/Devops-repo/dispatches \
            -d '{"event_type":"testing-frontend-vendor"}'

          echo "✅ Trigger completed."
